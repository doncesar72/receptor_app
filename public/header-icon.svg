<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect width="40" height="40" rx="8" fill="url(#bgGradient)"/>
  
  <!-- Fridge icon -->
  <g transform="translate(10, 8) scale(0.8)">
    <!-- Fridge body -->
    <rect x="0" y="5" width="20" height="25" rx="2" fill="white" opacity="0.95"/>
    
    <!-- Freezer section -->
    <rect x="0" y="5" width="20" height="7" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Freezer handle -->
    <rect x="2" y="8" width="7" height="1" rx="0.5" fill="#14b8a6"/>
    
    <!-- Fridge handle -->
    <rect x="2" y="18" width="7" height="1" rx="0.5" fill="#14b8a6"/>
    
    <!-- Temperature indicator -->
    <circle cx="18" cy="8" r="1" fill="#14b8a6"/>
  </g>
  
  <!-- Chef hat on top -->
  <g transform="translate(16, 4) scale(0.7)">
    <!-- Hat base -->
    <ellipse cx="8" cy="4" rx="8" ry="2" fill="white" opacity="0.9"/>
    <!-- Hat top -->
    <rect x="4" y="0" width="8" height="4" rx="1" fill="white" opacity="0.95"/>
    <!-- Hat band -->
    <rect x="4" y="2.5" width="8" height="1" fill="#14b8a6" opacity="0.7"/>
  </g>
</svg>
