<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect width="40" height="40" rx="8" fill="url(#bgGradient)"/>
  
  <!-- Chef hat with refrigerator icon -->
  <g transform="translate(8, 6)">
    <!-- Refrigerator body -->
    <rect x="2" y="8" width="20" height="22" rx="2" fill="white" opacity="0.95"/>
    
    <!-- Freezer section -->
    <rect x="2" y="8" width="20" height="6" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Freezer handle -->
    <rect x="4" y="10" width="6" height="1" rx="0.5" fill="#14b8a6"/>
    
    <!-- Fridge handle -->
    <rect x="4" y="16" width="6" height="1" rx="0.5" fill="#14b8a6"/>
    
    <!-- Temperature indicator -->
    <circle cx="19" cy="10" r="1" fill="#14b8a6"/>
    
    <!-- Chef hat -->
    <g transform="translate(6, 2)">
      <!-- Hat base -->
      <ellipse cx="6" cy="3" rx="6" ry="1.5" fill="white" opacity="0.9"/>
      <!-- Hat top -->
      <rect x="3" y="0" width="6" height="3" rx="1" fill="white" opacity="0.95"/>
      <!-- Hat band -->
      <rect x="3" y="2" width="6" height="0.8" fill="#14b8a6" opacity="0.7"/>
    </g>
  </g>
</svg>
